services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: app_scaffold
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  ops-agent:
    build: ./ops-agent
    env_file:
      - ./ops-agent/.env
    environment:
      MODEL_NAME: gemini-2.5-flash
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/app_scaffold
      OPS_AGENT_SEED_DIR: /seed_data
    volumes:
      - ./server/seed_data:/seed_data:ro
    ports:
      - "8010:8010"

  api:
    build: ./server
    environment:
      ENV: development
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/app_scaffold
      SECRET_KEY: ${SECRET_KEY:-change-me-dev-secret-key-min-32-bytes}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      GOOGLE_GENAI_USE_VERTEXAI: "false"
      OPS_AGENT_BASE_URL: http://ops-agent:8010
      OPS_AGENT_TIMEOUT_SECONDS: "90"
    ports:
      - "8000:8000"
    depends_on:
      - db
      - ops-agent

  client:
    build: ./client
    ports:
      - "5173:80"
    depends_on:
      - api

volumes:
  postgres_data:
